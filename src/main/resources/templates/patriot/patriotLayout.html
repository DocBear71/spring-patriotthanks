<!DOCTYPE html>

<html th:fragment="patriotLayout (template, menu)"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/png" th:href="@{/resources/images/patriot-thanks-favicon.png}">
  <title>Patriot Thanks - Supporting Those Who Serve</title>
  <link th:href="@{/webjars/font-awesome/css/font-awesome.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/resources/css/petclinic.css}" />
  <link rel="stylesheet" th:href="@{/resources/css/patriot.css}" />

  <style>
    /* Patriot Thanks Navy/Gold theme overrides */
    .navbar {
      background: linear-gradient(135deg, #1a2744 0%, #2c3e6b 100%) !important;
    }
    .navbar-brand span {
      background-image: none !important;
    }

    .navbar-nav button.nav-link {
      border: none;
      border-radius: 0;
      cursor: pointer;
      padding: 28px 8px;
      display: flex;
      align-items: center;
      text-transform: uppercase;
      font-size: 14px;
      font-family: 'montserratregular', sans-serif;
    }
    .navbar-nav button.nav-link:hover,
    .navbar-nav .nav-link:hover {
      background-color: #d4a843 !important;
      color: #1a2744 !important;
    }
    .navbar-nav .nav-link.active {
      background-color: #d4a843 !important;
      color: #1a2744 !important;
    }
    @media (max-width: 991.98px) {
      .navbar-nav form {
        width: 100%;
      }
      .navbar-nav button.nav-link {
        padding: 28px 20px;
        width: 100%;
        justify-content: flex-start;
        text-align: left;
      }
    }
  </style>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script>
    $(document).ready(function(){
      $('.navbar-nav button.nav-link').hover(
        function() { $(this).css("background-color", "#d4a843"); },
        function() { $(this).css("background-color", "rgba(0, 0, 0, 0)"); }
      );

      const $flash = $('.flash-message');
      if ($flash.length) {
        setTimeout(function() {
          $flash.slideUp(500, function() { $(this).remove(); });
        }, 10000);
      }
    });
  </script>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/}">
      <img th:src="@{/resources/images/patriot-thanks-logo.png}"
           alt="Patriot Thanks" style="height:50px; width:auto;" />
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#patriot-navbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="patriot-navbar">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0" th:remove="all">
        <li th:fragment="menuItem (link,active,title,glyph,text)" th:class="nav-item">
          <a th:class="${active==menu ? 'nav-link active' : 'nav-link'}" th:href="@{__${link}__}" th:title="${title}">
            <span th:class="'fa fa-'+${glyph}" class="fa fa-home"></span>
            <span th:text="${text}">Template</span>
          </a>
        </li>
      </ul>

      <ul class="nav navbar-nav me-auto">
        <li th:replace="~{::menuItem ('/','home','home page','home','Home')}">
          <span class="fa fa-home" aria-hidden="true"></span>
          <span>Home</span>
        </li>
        <li th:replace="~{::menuItem ('/businesses','businesses','find businesses','building','Find Businesses')}">
          <span class="fa fa-building" aria-hidden="true"></span>
          <span>Find Businesses</span>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto">

        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/patriot/register}"
             th:classappend="${menu == 'patriotRegister' ? 'active' : ''}">
            <span class="fa fa-user-plus"></span> Register
          </a>
        </li>

        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/patriot/login}"
             th:classappend="${menu == 'patriotLogin' ? 'active' : ''}">
            <span class="fa fa-sign-in"></span> Login
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/patriot/profile}"
             th:classappend="${menu == 'patriotProfile' ? 'active' : ''}">
            <span class="fa fa-user"></span> Edit Profile
          </a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/patriot/logout}" method="post" class="d-flex" style="height: 100%; margin: 0;">
            <button type="submit" class="nav-link btn btn-link"
                    style="border: none; background: transparent; cursor: pointer; display: flex; align-items: center;">
              <span class="fa fa-sign-out" style="margin-right: 5px;"></span> Logout
            </button>
          </form>
        </li>

      </ul>

    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="container xd-container">
    <div th:if="${messageSuccess}"
         class="alert alert-success alert-dismissible fade show flash-message"
         role="alert">
      <i class="fa fa-check-circle"></i>
      <span th:text="${messageSuccess}">Success</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${messageWarning}"
         class="alert alert-warning alert-dismissible fade show flash-message"
         role="alert">
      <i class="fa fa-exclamation-circle"></i>
      <span th:text="${messageWarning}">Warning</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${messageDanger}"
         class="alert alert-danger alert-dismissible fade show flash-message"
         role="alert">
      <i class="fa fa-times-circle"></i>
      <span th:text="${messageDanger}">Error</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <th:block th:insert="${template}" />

    <br />
    <br />
    <div class="container">
      <div class="row">
        <div class="col-12 text-center">
          <small class="text-muted">&copy; 2026 Patriot Thanks &mdash; Supporting Those Who Serve</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
