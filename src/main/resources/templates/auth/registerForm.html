<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'register')}">

<body>

<h2 class="text-center" th:text="#{title.register.new}">Register New Student</h2>

<div class="container mt-4" style="max-width: 500px;">

  <form th:action="@{/register-student}" th:object="${user}" method="post" class="form-horizontal">

    <div th:replace="~{fragments/inputField :: input ('First Name', 'firstName', 'text')}"></div>
  <div th:replace="~{fragments/inputField :: input ('Last Name', 'lastName', 'text')}"></div>
  <div th:replace="~{fragments/inputField :: input ('Email', 'email', 'text')}"></div>
  <div th:replace="~{fragments/inputField :: input ('Password', 'password', 'password')}"></div>

  <div class="form-group">
    <div class="d-grid gap-2 mt-4">
      <button class="btn btn-primary" type="submit" th:text="#{button.register}">Register</button>
    </div>
  </div>

  <div class="form-group">
    <div class="col-sm-offset-2 col-sm-10">
      <p>
        <br/>
        <span th:text="#{text.auth.existing}">Already have an account?</span>
        <a th:href="@{/login}" th:text="#{link.auth.login}">Login here</a>
      </p>
    </div>
  </div>

</form>

</body>
</html>
