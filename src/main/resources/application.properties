# database init, supports mysql too
database=h2
spring.sql.init.schema-locations=classpath*:db/${database}/schema.sql
spring.sql.init.data-locations=classpath*:db/${database}/data.sql

# Web
spring.thymeleaf.mode=HTML

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl

# Internationalization
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8

# Actuator
management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.context.annotation=TRACE

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h


# =====================================================================
# Cloudflare Turnstile CAPTCHA Configuration
# Add these to the END of your application.properties
# =====================================================================
# These are Cloudflare's official TEST keys that always pass verification.
# Replace with real keys from https://dash.cloudflare.com/turnstile when ready.
# Test Site Key: Always renders a visible widget that auto-passes
# Test Secret Key: Always returns success for server-side verification
turnstile.site-key=1x00000000000000000000AA
turnstile.secret-key=1x0000000000000000000000000000000AA
